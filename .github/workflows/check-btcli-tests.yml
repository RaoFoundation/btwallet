name: Bittensor BTCLI Test

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: e2e-cli-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
      - staging
    types: [opened, synchronize, reopened, labeled, unlabeled]

env:
  CARGO_TERM_COLOR: always
  VERBOSE: ${{ github.event.inputs.verbose }}

jobs:
  apply-label-to-new-pr:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}
    outputs:
      should_continue_cli: ${{ steps.check.outputs.should_continue_cli }}
    steps:
      - name: Check
        id: check
        run: |
          ACTION="${{ github.event.action }}"
          if [[ "$ACTION" == "opened" || "$ACTION" == "reopened" ]]; then
            echo "should_continue_cli=true" >> $GITHUB_OUTPUT
          else
            echo "should_continue_cli=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Add label
        if: steps.check.outputs.should_continue_cli == 'true'
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: run-bittensor-cli-tests

  check-labels:
    needs: apply-label-to-new-pr
    runs-on: ubuntu-latest
    if: always()
    outputs:
      run-cli-tests: ${{ steps.get-labels.outputs.run-cli-tests }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Get labels from PR
        id: get-labels
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')
          echo "Current labels: $LABELS"
          if echo "$LABELS" | grep -q "run-bittensor-cli-tests"; then
            echo "run-cli-tests=true" >> $GITHUB_OUTPUT
          else
            echo "run-cli-tests=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  find-e2e-tests:
    needs: check-labels
    if: always() && needs.check-labels.outputs.run-cli-tests == 'true'
    runs-on: ubuntu-latest
    outputs:
      test-files: ${{ steps.get-tests.outputs.test-files }}
    steps:
      - name: Clone btcli @ staging
        run: git clone --depth 1 --branch staging https://github.com/opentensor/btcli.git

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Find e2e test files
        id: get-tests
        run: |
          test_files=$(find ${{ github.workspace }}/btcli/tests/e2e_tests -name "test*.py" | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "test-files=$test_files" >> $GITHUB_OUTPUT
        shell: bash

  pull-docker-image:
    needs: check-labels
    runs-on: ubuntu-latest
    if: always() && needs.check-labels.outputs.run-cli-tests == 'true'
    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

      - name: Pull Docker Image
        run: docker pull ghcr.io/opentensor/subtensor-localnet:devnet-ready

      - name: Save Docker Image to Cache
        run: docker save -o subtensor-localnet.tar ghcr.io/opentensor/subtensor-localnet:devnet-ready

      - name: Upload Docker Image as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: subtensor-localnet
          path: subtensor-localnet.tar

  run-e2e-tests:
    needs:
      - check-labels
      - find-e2e-tests
      - pull-docker-image

    if: always() && needs.check-labels.outputs.run-cli-tests == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        rust-branch:
          - stable
        rust-target:
          - x86_64-unknown-linux-gnu
        os:
          - ubuntu-latest
        test-file: ${{ fromJson(needs.find-e2e-tests.outputs.test-files) }}

    env:
      RELEASE_NAME: development
      RUSTV: ${{ matrix.rust-branch }}
      RUST_BACKTRACE: full
      RUST_BIN_DIR: target/${{ matrix.rust-target }}
      TARGET: ${{ matrix.rust-target }}
      VIRTUAL_ENV: ${{ github.workspace }}/btcli/.venv

    timeout-minutes: 60
    name: "e2e tests: ${{ matrix.test-file }}"
    steps:
      - name: Checkout PR branch of btwallet
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          path: btwallet

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang curl libssl-dev llvm libudev-dev protobuf-compiler jq

      - name: Add wasm32 target
        run: |
          rustup target add wasm32-unknown-unknown --toolchain stable-x86_64-unknown-linux-gnu
          rustup component add rust-src --toolchain stable-x86_64-unknown-linux-gnu

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Clone btcli @ staging
        run: git clone --depth 1 --branch staging https://github.com/opentensor/btcli.git

      - name: Sync btcli env (locked) + maturin
        working-directory: btcli
        run: |
          uv sync --group dev
          uv pip install maturin
          echo "${{ github.workspace }}/btcli/.venv/bin" >> $GITHUB_PATH

      - name: Build local btwallet into btcli venv
        working-directory: btwallet
        run: maturin develop

      - name: Download Cached Docker Image
        uses: actions/download-artifact@v8
        with:
          name: subtensor-localnet

      - name: Load Docker Image
        run: docker load -i subtensor-localnet.tar

      - name: Run tests
        working-directory: btcli
        run: pytest ${{ matrix.test-file }} -s


  run-unit-test:
    needs:
      - check-labels
    if: always() && needs.check-labels.outputs.run-cli-tests == 'true'
    runs-on: ubuntu-latest
    env:
      VIRTUAL_ENV: ${{ github.workspace }}/btcli/.venv
    steps:
      - name: Checkout PR branch of btwallet
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          path: btwallet

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang curl libssl-dev llvm libudev-dev protobuf-compiler

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Clone btcli @ staging
        run: git clone --depth 1 --branch staging https://github.com/opentensor/btcli.git

      - name: Sync btcli env (locked) + maturin
        working-directory: btcli
        run: |
          uv sync --dev
          uv pip install maturin
          echo "${{ github.workspace }}/btcli/.venv/bin" >> $GITHUB_PATH

      - name: Build local btwallet into btcli venv
        working-directory: btwallet
        run: maturin develop

      - name: Run unit tests
        working-directory: btcli
        run: pytest tests/unit_tests
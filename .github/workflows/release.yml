name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "What to publish (both, crate-only, pypi-only)"
        type: choice
        options:
          - both
          - crate-only
          - pypi-only
        default: both

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: x86
          - runner: ubuntu-24.04-arm
            target: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM support
        if: matrix.platform.target == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build wheels
        uses: PyO3/maturin-action@v1.49.4
        with:
          target: ${{ matrix.platform.target }}
          args: >-
            --release
            --out dist
            --interpreter python3.10 python3.11 python3.12 python3.13 python3.14
            ${{ matrix.platform.target == 'aarch64' && '--features vendored-openssl' || '' }}
          sccache: 'true'
          manylinux: auto
          before-script-linux: |
            if command -v yum &> /dev/null; then
                yum update -y && yum install -y perl-core openssl openssl-devel pkgconfig libatomic

                # If we're running on i686 we need to symlink libatomic
                # in order to build openssl with -latomic flag.
                if [[ ! -d "/usr/lib64" ]]; then
                    ln -s /usr/lib/libatomic.so.1 /usr/lib/libatomic.so
                fi
            else
                # If we're running on debian-based system.
                apt update -y && apt-get install -y libssl-dev openssl pkg-config
            fi

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-13
            target: x86_64
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1.49.4
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter python3.10 python3.11 python3.12 python3.13 python3.14
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1.49.4
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # Publish Rust crate to crates.io (gate for PyPI on full release)
  release-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release
    if: >-
      (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
      && (github.event.inputs.publish_target != 'pypi-only')
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update &&
          sudo apt-get install -y clang curl libssl-dev llvm libudev-dev protobuf-compiler pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crate version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CRATE_VERSION="v$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if [ "$CRATE_VERSION" != "$TAG_NAME" ]; then
            echo "::error::Crate version ($CRATE_VERSION) does not match tag ($TAG_NAME)"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publish Python wheels to PyPI
  release-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    needs:
      - linux
      - macos
      - sdist
      # Gate: require crate publish first on full release / crate-only won't trigger this
      # For pypi-only, release-crate is skipped so this condition is satisfied
      - release-crate
    if: >-
      always()
      && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
      && (github.event.inputs.publish_target != 'crate-only')
      && (needs.linux.result == 'success')
      && (needs.macos.result == 'success')
      && (needs.sdist.result == 'success')
      && (needs.release-crate.result == 'success' || needs.release-crate.result == 'skipped')
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'wheels-*/*'
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1.49.4
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
